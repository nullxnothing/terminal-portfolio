<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nullxnothing</title>
  <meta name="description" content="solana developer — building onchain tools & infrastructure" />

  <meta name="theme-color" content="#00ff00" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body>
  <canvas id="rain"></canvas>

  <div id="crt">
    <div id="scanlines"></div>
    <div id="vignette"></div>

    <div id="terminal">

      <div id="identity" class="hidden">
        <div id="name-text"></div>

      <div id="projects-section" class="hidden">
        <div class="section-label" id="projects-label"></div>
        <div id="projects-list"></div>
      </div>

      <div id="terminal-end" class="hidden">
        <span class="cursor blink">_</span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
